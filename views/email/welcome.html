<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{subject}}</title>
    <style>
      /* Internal styles work in modern clients, inline fallback is safer for older clients */
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 600px;
        background: #ffffff;
        padding: 30px;
        margin: 0 auto;
        border-radius: 8px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      }
      .otp-code {
        display: inline-block;
        font-family: 'Courier New', Courier, monospace;
        font-size: 32px;
        font-weight: bold;
        letter-spacing: 6px;
        color: #e53e3e;
        background-color: #fff5f5;
        border: 2px dashed #feb2b2;
        padding: 12px 24px;
        border-radius: 6px;
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
      <tr>
        <td>
          <div class="container">
            <h2 style="color: #2d3748">Hello, {{firstName}}!</h2>
            <p style="color: #4a5568; line-height: 1.6">
              Welcome to the Inventory system. We're glad to have you
              on board helping us keep our neighborhoods safe.
            </p>
            <p style="color: #4a5568; line-height: 1.6">
              Please use the 6-digit verification code below to complete your profile
              verification:
            </p>

            <div class="otp-code">{{url}}</div>

            <hr
              style="border: 0; border-top: 1px solid #e2e8f0; margin: 30px 0"
            />
            <p style="font-size: 12px; color: #a0aec0">
              If you did not sign up for this account, you can safely ignore
              this email.
            </p>
          </div>
        </td>
      </tr>
    </table>
  </body>
</html>
